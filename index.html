<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>點餐</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f2f2f7; color: #1c1c1e; min-height: 100vh; }
    .container { max-width: 480px; margin: 0 auto; padding: 16px; }

    /* ── Shared ── */
    .card { background: #fff; border-radius: 16px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .loading { text-align: center; padding: 60px 20px; color: #888; font-size: 15px; }
    .empty-state { text-align: center; padding: 60px 20px; color: #888; }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }

    /* ── Landing page ── */
    .site-header { text-align: center; padding: 28px 0 8px; }
    .site-header h1 { font-size: 22px; font-weight: 700; }
    .site-header p  { font-size: 14px; color: #888; margin-top: 4px; }
    .current-card { border: 2px solid #3b82f6; }
    .current-label { font-size: 12px; font-weight: 600; color: #3b82f6; letter-spacing: .5px; margin-bottom: 8px; }
    .current-title { font-size: 19px; font-weight: 700; margin-bottom: 6px; }
    .go-btn { display: block; width: 100%; background: #3b82f6; color: #fff; border: none; border-radius: 12px; padding: 14px; font-size: 16px; font-weight: 600; text-align: center; text-decoration: none; margin-top: 14px; cursor: pointer; }
    .go-btn:active { background: #2563eb; }
    .go-btn.closed { background: #9ca3af; cursor: default; }
    .section-heading { font-size: 13px; font-weight: 600; color: #888; letter-spacing: .5px; margin: 20px 0 8px; text-transform: uppercase; }
    .history-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
    .history-item + .history-item { border-top: 1px solid #f0f0f0; }
    .history-title { font-size: 15px; font-weight: 500; }
    .history-date  { font-size: 12px; color: #888; margin-top: 2px; }
    .badge { font-size: 12px; padding: 3px 9px; border-radius: 20px; font-weight: 500; }
    .badge.open   { background: #dbeafe; color: #1d4ed8; }
    .badge.closed { background: #f0f0f0; color: #888; }
    .history-link { font-size: 13px; color: #3b82f6; text-decoration: none; margin-left: 8px; }

    /* ── Order form ── */
    .session-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .deadline-tag { display: inline-block; font-size: 13px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
    .deadline-tag.open   { background: #e3f5e9; color: #1a7f3c; }
    .deadline-tag.urgent { background: #ffeaea; color: #d93025; }
    .deadline-tag.closed { background: #f0f0f0; color: #888; }
    .field-label { font-size: 13px; color: #888; margin-bottom: 6px; }
    input[type="text"] { width: 100%; border: 1.5px solid #e0e0e0; border-radius: 10px; padding: 11px 13px; font-size: 16px; outline: none; transition: border-color .2s; }
    input[type="text"]:focus { border-color: #3b82f6; }
    .cat-title { font-size: 15px; font-weight: 600; color: #555; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #f0f0f0; }
    .item-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; }
    .item-row + .item-row { border-top: 1px solid #f5f5f5; }
    .item-name { font-size: 15px; font-weight: 500; }
    .item-price { font-size: 13px; color: #888; margin-top: 2px; }
    .qty-wrap { display: flex; align-items: center; gap: 10px; }
    .qty-btn { width: 30px; height: 30px; border: 1.5px solid #d0d0d0; background: #fafafa; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #333; transition: background .15s; }
    .qty-btn:active { background: #e8e8e8; }
    .qty-num { min-width: 22px; text-align: center; font-size: 16px; font-weight: 600; }
    .qty-num.nonzero { color: #3b82f6; }
    .submit-btn { width: 100%; background: #3b82f6; color: #fff; border: none; border-radius: 14px; padding: 15px; font-size: 17px; font-weight: 600; cursor: pointer; transition: background .2s; }
    .submit-btn:disabled { background: #b0c4e8; cursor: not-allowed; }
    .submit-btn:not(:disabled):active { background: #2563eb; }
    .msg { padding: 12px 16px; border-radius: 10px; font-size: 14px; font-weight: 500; margin-top: 8px; text-align: center; }
    .msg.error   { background: #fef0f0; color: #d93025; }
    .msg.success { background: #e3f5e9; color: #1a7f3c; }
    .msg.info    { background: #eef3ff; color: #3b5bdb; }
    .closed-banner { background: #f8d7da; color: #842029; border-radius: 12px; padding: 14px 16px; text-align: center; font-weight: 600; font-size: 15px; margin-bottom: 12px; }
    .back-link { display: inline-block; font-size: 14px; color: #3b82f6; text-decoration: none; margin-bottom: 12px; }
    .stats-heading { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: #333; }
    .stats-person { padding: 8px 0; font-size: 14px; border-top: 1px solid #f0f0f0; }
    .stats-person:first-of-type { border-top: none; }
    .stats-person-name { font-weight: 600; margin-bottom: 2px; }
    .stats-person-items { color: #555; }
    .stats-person-note { color: #888; font-size: 13px; }
    .stats-divider { border: none; border-top: 1.5px solid #e8e8e8; margin: 12px 0; }
    .stats-total-row { display: flex; justify-content: space-between; font-size: 14px; padding: 4px 0; }
    .stats-total-name { color: #333; }
    .stats-total-qty { font-weight: 600; color: #3b82f6; }
    .copy-btn { width: 100%; background: #f0f0f0; color: #333; border: none; border-radius: 10px; padding: 11px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 12px; transition: background .15s; }
    .copy-btn:active { background: #e0e0e0; }
    .copy-btn.copied { background: #e3f5e9; color: #1a7f3c; }
  </style>
</head>
<body>
<div class="container" id="app">
  <div class="loading">載入中…</div>
</div>

<script>
  const DB_URL = 'https://onlinemenu-57cf4-default-rtdb.firebaseio.com';

  const CATEGORY_EMOJI = {
    drink: '🧋', food: '🍰', 冷盤: '🥗', 炒類: '🍳', 小菜: '🥢',
    熱炒: '🔥', 湯類: '🍲', 鐵板三杯: '🍖', 炸類: '🍤', 燒烤: '🔥',
  };

  const params = new URLSearchParams(location.search);
  const sessionId = params.get('s');

  // ── Router ──────────────────────────────────────────────────────────────────
  if (sessionId) {
    initOrderPage();
  } else {
    initLandingPage();
  }

  // ══════════════════════════════════════════════════════════════════════════
  // LANDING PAGE
  // ══════════════════════════════════════════════════════════════════════════
  async function initLandingPage() {
    try {
      // Fetch current session ID from Firebase config
      const [cfgRes, allRes] = await Promise.all([
        fetch(`${DB_URL}/config/current_session.json`),
        fetch(`${DB_URL}/orders.json?shallow=true`),
      ]);
      const currentId = await cfgRes.json();   // string or null
      const allKeys   = await allRes.json();   // { "20260428-2053": true, ... }

      // Fetch metadata for current session
      let currentMeta = null;
      if (currentId) {
        const metaRes = await fetch(`${DB_URL}/orders/${currentId}/meta.json`);
        currentMeta = await metaRes.json();
      }

      // Sort all sessions newest-first
      const sessionIds = allKeys ? Object.keys(allKeys).sort().reverse() : [];

      // Fetch meta for recent sessions (up to 5, excluding current)
      const otherIds = sessionIds.filter(id => id !== currentId).slice(0, 5);
      const otherMetas = await Promise.all(
        otherIds.map(id => fetch(`${DB_URL}/orders/${id}/meta.json`).then(r => r.json()))
      );

      renderLanding(currentId, currentMeta, otherIds, otherMetas);
    } catch (e) {
      setApp(emptyState('⚠️', '載入失敗，請稍後重試'));
    }
  }

  function renderLanding(currentId, currentMeta, otherIds, otherMetas) {
    const now = Math.floor(Date.now() / 1000);

    let html = `
      <div class="site-header">
        <h1>🍱 點餐系統</h1>
        <p>選擇目前開放的點餐</p>
      </div>
    `;

    // Current session
    if (currentId && currentMeta) {
      const isOpen = currentMeta.status !== 'closed' &&
                     (!currentMeta.deadline || now < currentMeta.deadline);
      const dl = deadlineInfo(currentMeta.deadline);
      html += `
        <div class="card current-card">
          <div class="current-label">🟢 目前開放</div>
          <div class="current-title">${esc(currentMeta.title || '點餐')}</div>
          ${dl ? `<span class="deadline-tag ${dl.cls}">${esc(dl.text)}</span>` : ''}
          <a class="go-btn ${isOpen ? '' : 'closed'}" href="/?s=${esc(currentId)}">
            ${isOpen ? '立即點餐 →' : '已截止'}
          </a>
        </div>
      `;
    } else {
      html += `
        <div class="card" style="text-align:center;padding:24px;color:#888">
          目前沒有開放中的點餐
        </div>
      `;
    }

    // History
    if (otherIds.length > 0) {
      html += `<div class="section-heading">歷史記錄</div><div class="card">`;
      otherIds.forEach((id, i) => {
        const meta = otherMetas[i];
        if (!meta) return;
        const isOpen = meta.status !== 'closed' && (!meta.deadline || now < meta.deadline);
        const dateStr = id.replace(/(\d{4})(\d{2})(\d{2})-(\d{2})(\d{2})/, '$1/$2/$3 $4:$5');
        html += `
          <div class="history-item">
            <div>
              <div class="history-title">${esc(meta.title || '點餐')}</div>
              <div class="history-date">${esc(dateStr)}</div>
            </div>
            <div style="display:flex;align-items:center">
              <span class="badge ${isOpen ? 'open' : 'closed'}">${isOpen ? '開放' : '已截止'}</span>
              <a class="history-link" href="/?s=${esc(id)}">進入</a>
            </div>
          </div>
        `;
      });
      html += `</div>`;
    }

    setApp(html);
  }

  // ══════════════════════════════════════════════════════════════════════════
  // ORDER FORM PAGE
  // ══════════════════════════════════════════════════════════════════════════
  let sessionData = null;
  let isClosed = false;
  const quantities = {};

  async function initOrderPage() {
    try {
      const res = await fetch(`${DB_URL}/orders/${sessionId}.json`);
      sessionData = await res.json();
    } catch (e) {
      setApp(emptyState('⚠️', '網路錯誤，請稍後重試'));
      return;
    }

    if (!sessionData?.meta) {
      setApp(emptyState('🔍', '找不到此點餐，請確認連結'));
      return;
    }

    const { meta } = sessionData;
    isClosed = meta.status === 'closed' ||
               (meta.deadline && Math.floor(Date.now() / 1000) > meta.deadline);
    renderOrderPage();
  }

  function renderOrderPage() {
    const { meta, items } = sessionData;
    const dl = deadlineInfo(meta.deadline);

    let html = `
      <a class="back-link" href="/">← 返回首頁</a>
      <div class="card">
        <div class="session-title">${esc(meta.title || '點餐')}</div>
        ${dl ? `<span class="deadline-tag ${dl.cls}">${esc(dl.text)}</span>` : ''}
      </div>
    `;

    if (isClosed) {
      html += `<div class="closed-banner">⛔ 點餐已截止</div>`;
      html += `<div class="card" id="stats-card"><div class="loading" style="padding:20px">載入統計中…</div></div>`;
    } else {
      html += `
        <div class="card">
          <div class="field-label">你的名字</div>
          <input type="text" id="inp-name" placeholder="輸入姓名" autocomplete="off">
        </div>
      `;
    }

    if (items) {
      for (const [catKey, catItems] of Object.entries(items)) {
        if (!catItems || typeof catItems !== 'object') continue;
        const emoji = CATEGORY_EMOJI[catKey] || '🍽';
        html += `<div class="card"><div class="cat-title">${emoji} ${esc(catKey)}</div>`;
        for (const [itemId, item] of Object.entries(catItems)) {
          const fullId = `${catKey}__${itemId}`;
          quantities[fullId] = 0;
          html += `
            <div class="item-row">
              <div>
                <div class="item-name">${esc(item.name)}</div>
                ${item.price ? `<div class="item-price">$${item.price}</div>` : ''}
              </div>
              ${isClosed ? '' : `
              <div class="qty-wrap">
                <button class="qty-btn" onclick="changeQty('${fullId}',-1)">−</button>
                <span class="qty-num" id="q-${fullId}">0</span>
                <button class="qty-btn" onclick="changeQty('${fullId}',1)">+</button>
              </div>`}
            </div>
          `;
        }
        html += `</div>`;
      }
    }

    if (!isClosed) {
      html += `
        <div class="card">
          <div class="field-label">備註（選填）</div>
          <input type="text" id="inp-note" placeholder="例：少冰、去冰、不辣…">
        </div>
        <button class="submit-btn" id="btn-submit" onclick="submitOrder()">送出訂單</button>
        <div id="msg-area"></div>
      `;
    }

    setApp(html);
    setupNameField();
    if (isClosed) loadAndRenderStats();
  }

  async function loadAndRenderStats() {
    let submissions = null;
    try {
      const res = await fetch(`${DB_URL}/orders/${sessionId}/submissions.json`);
      submissions = await res.json();
    } catch (e) {}

    const card = document.getElementById('stats-card');
    if (!card) return;

    if (!submissions || Object.keys(submissions).length === 0) {
      card.innerHTML = '<div style="color:#888;text-align:center;padding:20px">尚無人點餐</div>';
      return;
    }

    const totals = {};
    let peopleHtml = '';

    for (const [name, data] of Object.entries(submissions)) {
      const orders = data.orders || [];
      orders.forEach(o => { totals[o.name] = (totals[o.name] || 0) + o.qty; });
      const itemStr = orders.map(o => `${o.name} ×${o.qty}`).join('、');
      peopleHtml += `
        <div class="stats-person">
          <div class="stats-person-name">${esc(name)}</div>
          <div class="stats-person-items">${esc(itemStr)}</div>
          ${data.note ? `<div class="stats-person-note">備註：${esc(data.note)}</div>` : ''}
        </div>`;
    }

    let totalsHtml = '';
    for (const [name, qty] of Object.entries(totals)) {
      totalsHtml += `
        <div class="stats-total-row">
          <span class="stats-total-name">${esc(name)}</span>
          <span class="stats-total-qty">×${qty}</span>
        </div>`;
    }

    const count = Object.keys(submissions).length;
    card.innerHTML = `
      <div class="stats-heading">📊 點餐統計（共 ${count} 人）</div>
      ${peopleHtml}
      <hr class="stats-divider">
      <div class="stats-heading">品項總計</div>
      ${totalsHtml}
      <button class="copy-btn" id="copy-btn" onclick="copyStats()">📋 複製結果</button>`;

    window._statsSubmissions = submissions;
    window._statsTotals = totals;
  }

  function buildStatsText() {
    const submissions = window._statsSubmissions;
    const totals = window._statsTotals;
    if (!submissions) return '';
    const { meta } = sessionData;
    const count = Object.keys(submissions).length;
    const lines = [`📋 ${meta.title || '點餐'} 結果`, `共 ${count} 人`, '──────────────────'];
    for (const [name, data] of Object.entries(submissions)) {
      const items = (data.orders || []).map(o => `${o.name}×${o.qty}`).join('、');
      let line = `${name}：${items}`;
      if (data.note) line += `  備註：${data.note}`;
      lines.push(line);
    }
    lines.push('──────────────────', '📊 品項統計');
    for (const [name, qty] of Object.entries(totals)) {
      lines.push(`${name}  × ${qty}`);
    }
    const total = Object.values(totals).reduce((a, b) => a + b, 0);
    lines.push('', `合計 ${total} 份`);
    return lines.join('\n');
  }

  function copyStats() {
    const text = buildStatsText();
    if (!text) return;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copy-btn');
      if (!btn) return;
      btn.textContent = '✅ 已複製';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '📋 複製結果'; btn.classList.remove('copied'); }, 2000);
    });
  }

  function setupNameField() {
    const inp = document.getElementById('inp-name');
    if (!inp) return;
    const saved = localStorage.getItem('lunch_order_name');
    if (saved) inp.value = saved;
    inp.addEventListener('change', () => {
      const name = inp.value.trim();
      if (!name) return;
      const prev = sessionData?.submissions?.[name];
      if (prev) {
        for (const o of (prev.orders || [])) {
          const fullId = `${o.cat}__${o.id}`;
          if (quantities.hasOwnProperty(fullId)) {
            quantities[fullId] = o.qty;
            const el = document.getElementById(`q-${fullId}`);
            if (el) { el.textContent = o.qty; el.classList.toggle('nonzero', o.qty > 0); }
          }
        }
        if (prev.note && document.getElementById('inp-note')) {
          document.getElementById('inp-note').value = prev.note;
        }
        document.getElementById('btn-submit').textContent = '更新訂單';
        showMsg('已載入你的上筆訂單，可直接修改後更新', 'info');
      }
    });
  }

  function changeQty(fullId, delta) {
    quantities[fullId] = Math.max(0, (quantities[fullId] || 0) + delta);
    const el = document.getElementById(`q-${fullId}`);
    if (el) { el.textContent = quantities[fullId]; el.classList.toggle('nonzero', quantities[fullId] > 0); }
  }

  async function submitOrder() {
    const nameEl = document.getElementById('inp-name');
    const name = nameEl?.value.trim();
    if (!name) { showMsg('請填寫姓名', 'error'); nameEl?.focus(); return; }

    const orders = [];
    for (const [fullId, qty] of Object.entries(quantities)) {
      if (qty <= 0) continue;
      const [cat, itemId] = fullId.split('__');
      const item = sessionData.items?.[cat]?.[itemId];
      if (item) orders.push({ id: itemId, cat, name: item.name, qty, price: item.price || 0 });
    }
    if (orders.length === 0) { showMsg('請至少選一樣', 'error'); return; }

    const note = document.getElementById('inp-note')?.value.trim() || '';
    const btn = document.getElementById('btn-submit');
    btn.disabled = true; btn.textContent = '送出中…';

    const safeKey = name.replace(/[.#$/\[\]]/g, '_');
    try {
      await fetch(`${DB_URL}/orders/${sessionId}/submissions/${encodeURIComponent(safeKey)}.json`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ submitted_at: Math.floor(Date.now() / 1000), orders, note }),
      });
      localStorage.setItem('lunch_order_name', name);
      const summary = orders.map(o => `${o.name} ×${o.qty}`).join('、');
      showMsg(`✅ 訂單已送出！\n${name}：${summary}${note ? `\n備註：${note}` : ''}`, 'success');
      btn.textContent = '已送出';
    } catch (e) {
      showMsg('送出失敗，請檢查網路後重試', 'error');
      btn.disabled = false; btn.textContent = '送出訂單';
    }
  }

  // ── Helpers ────────────────────────────────────────────────────────────────
  function deadlineInfo(ts) {
    if (!ts) return null;
    const now = Math.floor(Date.now() / 1000);
    const d = new Date(ts * 1000);
    const timeStr = `${d.getHours()}:${String(d.getMinutes()).padStart(2, '0')}`;
    if (now > ts) return { text: '已截止', cls: 'closed' };
    const left = ts - now;
    if (left < 3600) return { text: `截止 ${timeStr}（剩 ${Math.ceil(left/60)} 分鐘）`, cls: 'urgent' };
    return { text: `截止 ${timeStr}（剩 ${Math.floor(left/3600)} 時 ${Math.floor((left%3600)/60)} 分）`, cls: 'open' };
  }

  function emptyState(icon, text) {
    return `<div class="empty-state"><div class="icon">${icon}</div><p>${esc(text)}</p></div>`;
  }

  function setApp(html) { document.getElementById('app').innerHTML = html; }

  function showMsg(text, type) {
    const el = document.getElementById('msg-area');
    if (el) el.innerHTML = `<div class="msg ${type}">${text.replace(/\n/g,'<br>')}</div>`;
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
